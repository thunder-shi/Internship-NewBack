# Spring Boot Application Configuration
spring.application.name=newcms

# Redis配置
# 如果 Redis 未安装或不可用，请取消下面这行的注释来禁用 Redis 自动配置：
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
spring.data.redis.repositories.enabled=false

# Redis Connection Configuration
# 如果已禁用 Redis 自动配置，可以注释掉以下所有 spring.data.redis.* 配置
spring.data.redis.host=47.96.172.199
spring.data.redis.port=6379
spring.data.redis.password=hfut1603
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Server Configuration
server.port=8111

# DataSource Configuration
spring.datasource.url=jdbc:mysql://47.96.172.199:3306/internship?serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Hfut1603
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=DatebookHikariCP
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.database=mysql
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=GMT+8
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# spring.jpa.hibernate.naming.physical-strategy=newcms.config.JpaNamingStrategy
# 如果 JpaNamingStrategy 类不存在，可以注释掉这行使用默认策略

# Package Configuration
# Entity 和 Repository 的包路径配置，用于动态类加载
entity.package=newcms.entity.db.
repository.package=newcms.repository.db.

# Jackson Date Format Configuration
# FastJson 日期格式配置，用于 JSON 序列化和反序列化
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss