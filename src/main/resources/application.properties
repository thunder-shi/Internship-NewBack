# ==========================================
# JPA Configuration
# ==========================================
spring.jpa.database=mysql
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=GMT+8
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# spring.jpa.hibernate.naming.physical-strategy=newcms.config.JpaNamingStrategy

# ==========================================
# Logging Configuration
# ==========================================
# 显示 SQL 查询和参数
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# 显示 JPA 相关日志
logging.level.org.springframework.orm.jpa=DEBUG
# 显示数据源相关日志
logging.level.com.zaxxer.hikari=DEBUG
# 显示你项目中的日志（可以根据包名调整）
logging.level.newcms=DEBUG

# ==========================================
# Package Configuration
# ==========================================
entity.package=newcms.entity.db.
repository.package=newcms.repository.db.

# ==========================================
# Jackson Date Format
# ==========================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss